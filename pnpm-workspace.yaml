# pnpm workspace configuration (hand-managed — SSoT for pnpm settings on v11+).
# Only the two active Qwen-fork packages are members; the other packages/* dirs
# are pre-fork legacy and intentionally out of the workspace.
pmOnFail: download
strictDepBuilds: true
packages:
  - "apps/airiscode-cli"
  - "packages/airiscode-runtime"

# Dependency build scripts are blocked by default on pnpm 11 (strictDepBuilds).
# Only deps that genuinely need a postinstall/native build are allowed.
allowBuilds:
  esbuild: true   # fetches its platform binary at install (used by vitest / tsup)
  msw: true       # mock-service-worker setup (test dependency)
