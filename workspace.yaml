version: 1
name: airiscode
mode: docker-first
catalog:
  react: 19.1.0
  next: 16.0.10
  typescript: 5.9.3
  vitest: 4.0.15
workspaces:
  apps:
  - name: airiscode-cli
    type: node
  libs:
  - name: adapters
    type: node
  - name: airis-tools
    type: node
  - name: api
    type: node
  - name: core-gemini
    type: node
  - name: drivers
    type: node
  - name: gemini-cli-core
    type: node
  - name: gemini-core
    type: node
  - name: mcp
    type: node
  - name: mindbase
    type: node
  - name: policies
    type: node
  - name: runners
    type: node
  - name: sandbox
    type: node
  - name: super-agent
    type: node
  - name: types
    type: node
  - name: ui-gemini
    type: node
  - name: ux
    type: node
apps: {}
docker:
  baseImage: node:22-alpine
  workdir: /app
  workspace:
    service: workspace
    volumes:
    - node_modules
rules: {}
just:
  output: justfile
  features:
  - docker-first-guard
  - type-specific-commands
types: {}
