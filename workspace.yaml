version: 1
name: airiscode
mode: docker-first
catalog:
  react: 19.1.0
  next: 16.0.10
  typescript: 5.9.3
  vitest: 4.0.15
workspaces:
  apps:
  - name: dashboard
    type: nextjs
  - name: api
    type: node
  libs: []
apps: {}
docker:
  baseImage: node:22-alpine
  workdir: /app
  workspace:
    service: workspace
    volumes:
    - node_modules
rules: {}
just:
  output: justfile
  features:
  - docker-first-guard
  - type-specific-commands
types: {}
